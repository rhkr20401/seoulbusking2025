    <script>
        // 쿠키 읽기 함수
        function getCookie(name) {
            let cookies = document.cookie.split("; "); // 쿠키 문자열을 배열로 변환
            for (let i = 0; i < cookies.length; i++) {
                let [key, value] = cookies[i].split("="); // 쿠키 key=value 분리
                if (key === name) {
                    return decodeURIComponent(value); // 쿠키 값 반환
                }
            }
            return null;
        }

        // 쿠키 설정 함수
        function setCookie(name, value, days) {
            let date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000)); // days를 밀리초로 변환
            document.cookie = `${name}=${encodeURIComponent(value)}; path=/; expires=${date.toUTCString()};`;
        }

        // 팝업 닫기 및 쿠키 저장
        function popupClose() {
            setCookie("popupDayClose", "true", 1);
            document.getElementById("popup").style.display = 'none';
        }

        // 단순 팝업 닫기
        function popupCloses() {
            document.getElementById("popup").style.display = 'none';
        }

        // 페이지 로드 시 쿠키 확인하여 팝업 표시 여부 결정
        window.addEventListener("DOMContentLoaded", function () {
            if (getCookie("popupDayClose") === "true") {
                document.getElementById("popup").style.display = 'none';
            }
        });
    </script>
